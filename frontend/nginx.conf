# =============================================================================
# KARI.Самозанятые — Конфиг nginx для Frontend
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие для быстрой загрузки
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # React Router — все пути отдаём index.html
    # Без этого при обновлении страницы (F5 на /dashboard) будет 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API запросов к backend
    # Фронтенд делает запросы на /api/* → они идут на backend:8000
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Кэширование статических файлов (JS, CSS, картинки)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Страница ошибки
    error_page 404 /index.html;
}
