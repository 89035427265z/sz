# =============================================================================
# KARI.Самозанятые — Конфигурация Alembic (миграции базы данных)
# =============================================================================
# Alembic — инструмент для управления изменениями в структуре БД.
# Каждое изменение (новая таблица, новая колонка) = отдельный файл миграции.
#
# Команды для IT поддержки:
#   alembic upgrade head        — применить все миграции (создать все таблицы)
#   alembic upgrade +1          — применить одну следующую миграцию
#   alembic downgrade -1        — откатить последнюю миграцию
#   alembic current             — показать текущую версию БД
#   alembic history             — показать все миграции
# =============================================================================

[alembic]
# Папка с файлами миграций
script_location = alembic

# Формат имён файлов миграций: дата_время_описание
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# URL базы данных — берётся из переменной окружения DATABASE_URL
# Если переменная не задана, используется значение по умолчанию ниже
# ВАЖНО: для Alembic используем синхронный драйвер (postgresql://), а не asyncpg
sqlalchemy.url = postgresql://kari:kari123@localhost:5432/kari_dev

# =============================================================================
# НАСТРОЙКИ ЛОГИРОВАНИЯ
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
